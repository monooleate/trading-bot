[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."*"]
  node_bundler = "esbuild"

# Scheduled scan: óránként (UTC)
[functions."scheduled-scan"]
  schedule = "0 * * * *"

# Auto-trader: minden 3 percben (UTC)
[functions."auto-trader"]
  schedule = "*/3 * * * *"

# Weather auto-trader cron — minden 5 percben.
# Csak akkor csinál bármit, ha a Settings tab-on a "Enable scheduled cron runs"
# toggle be van kapcsolva (weatherCronEnabled = 1 a runtime overrides-ban).
[functions."auto-trader-weather-cron"]
  schedule = "*/5 * * * *"

# Weather paper-pozíció reconciler cron — 15 percenként ellenőrzi az
# endDate-en túli nyitott paper pozíciókat. Polymarket Gamma settlement
# elsődleges, METAR fallback 6h múlva. Always-on (nem gate-elt).
[functions."auto-trader-weather-reconciler-cron"]
  schedule = "*/15 * * * *"

# Multi-cron a Hyperliquid Perp és Funding Arb futtatásához.
# A meglévő auto-trader cron csak a crypto category-t hívja
# (default category="crypto" a dispatcherében), ezért a HL + FR
# sessionök 18 napon át sosem futottak. Ez fan-out-ot csinál.
[functions."auto-trader-multi-cron"]
  schedule = "*/3 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
