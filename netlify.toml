[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."*"]
  node_bundler = "esbuild"

# Scheduled scan: óránként (UTC)
[functions."scheduled-scan"]
  schedule = "0 * * * *"

# Auto-trader: minden 3 percben (UTC)
[functions."auto-trader"]
  schedule = "*/3 * * * *"

# Weather auto-trader cron — minden 5 percben.
# Csak akkor csinál bármit, ha a Settings tab-on a "Enable scheduled cron runs"
# toggle be van kapcsolva (weatherCronEnabled = 1 a runtime overrides-ban).
[functions."auto-trader-weather-cron"]
  schedule = "*/5 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
