[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."*"]
  node_bundler = "esbuild"

# Scheduled scan: óránként (UTC)
[functions."scheduled-scan"]
  schedule = "0 * * * *"

# Auto-trader: minden 3 percben (UTC)
[functions."auto-trader"]
  schedule = "*/3 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
